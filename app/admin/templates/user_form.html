{% extends "base.html" %}

{% block title %}{{ "Edit" if edit_user else "Create" }} User - GitLab Emulator Admin{% endblock %}

{% block content %}
<h2 class="f2 mb-3">{{ "Edit" if edit_user else "Create" }} User</h2>

<div class="Box p-4">
    <form method="post" action="{{ '/admin/users/' ~ edit_user.id if edit_user else '/admin/users/create' }}" class="admin-form">
        <div class="form-group">
            <label for="login">Login *</label>
            <input type="text" id="login" name="login" class="form-control" value="{{ edit_user.login if edit_user else '' }}" required {{ 'readonly' if edit_user else '' }}>
        </div>
        <div class="form-group">
            <label for="password">Password{{ " (leave blank to keep)" if edit_user else " *" }}</label>
            <input type="password" id="password" name="password" class="form-control" {{ '' if edit_user else 'required' }}>
        </div>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ edit_user.name if edit_user and edit_user.name else '' }}">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" value="{{ edit_user.email if edit_user and edit_user.email else '' }}">
        </div>
        <div class="form-checkbox">
            <label>
                <input type="checkbox" name="site_admin" value="1" {{ 'checked' if edit_user and edit_user.site_admin else '' }}>
                Site Administrator
            </label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ "Update" if edit_user else "Create" }} User</button>
            <a href="/admin/users" class="btn ml-2">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
