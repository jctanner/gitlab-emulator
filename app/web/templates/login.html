{% extends "base.html" %}
{% block title %}Sign in - GitLab Emulator{% endblock %}

{% block content %}
<div class="d-flex flex-justify-center mt-6">
    <div style="max-width:340px;width:100%;">
        <div class="text-center mb-4">
            <h1 class="f1">Sign in</h1>
        </div>

        {% if error %}
        <div class="flash flash-error mb-3">
            {{ error }}
        </div>
        {% endif %}

        <div class="Box p-4">
            <form method="post" action="{{ url_prefix }}/login">
                <div class="form-group">
                    <div class="form-group-header">
                        <label for="username">Username</label>
                    </div>
                    <div class="form-group-body">
                        <input type="text" id="username" name="username" class="form-control input-block" required autofocus>
                    </div>
                </div>
                <div class="form-group mt-3">
                    <div class="form-group-header">
                        <label for="password">Password</label>
                    </div>
                    <div class="form-group-body">
                        <input type="password" id="password" name="password" class="form-control input-block" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">Sign in</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
