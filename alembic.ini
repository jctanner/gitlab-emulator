# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# sys.path prepend — allows importing app modules
prepend_sys_path = .

# Database URL — overridden at runtime from GITLAB_EMULATOR_DATABASE_URL
# or falls back to the default used by app.config.Settings.
sqlalchemy.url = sqlite+aiosqlite:///data/gitlab_emulator.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
